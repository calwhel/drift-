[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start:production"
healthcheckPath = "/"
restartPolicyType = "on_failure"

# Schedule payment polling every minute (Railway cron)
# Configure in Railway dashboard: Cron → GET $NEXTAUTH_URL/api/cron/poll-payments
# Header: Authorization: Bearer $CRON_SECRET
