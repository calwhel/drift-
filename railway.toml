[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
preDeployCommand = "node scripts/migrate-sql.cjs --soft && node scripts/seed-admin.cjs admin@driftpayment.io --soft"
startCommand = "node scripts/start.cjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"

# Payment polling runs automatically inside the Next.js server (see src/lib/payment-poller.ts)
