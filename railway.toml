[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
preDeployCommand = "node scripts/migrate-sql.cjs --soft && node scripts/seed-admin.cjs admin@driftpayment.io --soft"
startCommand = "node scripts/start.cjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"

# Schedule payment polling every minute (Railway cron)
# Configure in Railway dashboard: Cron → GET $NEXTAUTH_URL/api/cron/poll-payments
# Header: Authorization: Bearer $CRON_SECRET
